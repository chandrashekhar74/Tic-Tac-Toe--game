<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors Game</title>
     <link rel="stylesheet" href="style1.css" />
</head>
<body>
    <h1>Rock Paper Scissors</h1>
    <div class="choices">
        <div class="choice id=rock">
            <img src="https://sihoonathan.github.io/rock-paper-scissors/assets/img/rock.png">
        </div>
         <div class="choice id=paper">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSuvl5zWfLVk_VaD0l8e9r_siHghdNliCLVAw&s">
        </div>
         <div class="choice id=scissor">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQUkJIrVbUlCAsKJR7rorApJ_Ynp72n4jWTMg&s">
        </div>
    </div>
    <div class="score-board">
        <div class="score">
            <p id="user-score">0</p>
            <p>You</p>
        </div>
        <div class="score">
            <p id="comp-score">0</p>
            <p>Computer</p>
        </div>
    </div>
    <div class="msg-container">
        <p id="msg">Play Your Move</p>
    </div>
    <script src="app1.js"></script>
</body>
</html>
